project:
  name: incident-pipeline
  version: 0.1

paths:
  storage_root: "${INCIDENT_PIPELINE_DATA_ROOT}"
  storage_namespace: "ntsb"
  raw: "raw"
  staged: "ingestion"
  processed: "extract"
  manifests: "manifests"
  logs: "logs"

database:
  manifest_path: "manifests/manifest.db"

ingestion:
  allowed_extensions:
    - .pdf
  compute_hash: true
  skip_duplicates: true

extraction:
  method: pypdf
  min_text_threshold: 500

ocr:
  enabled: false
  engine: tesseract
  min_text_threshold: 200

processing:
  overwrite_existing: false
  max_workers: 4

docket_ingest:
  manifest_path: "raw/acquisition/exports/ingestion_manifest_latest.jsonl"
  output_root: "ingestion"
  overwrite_existing: false

docket_triage:
  metadata_root: "ingestion/metadata"
  text_root: "ingestion/extracted"
  output_root: "triage/document_types"
  overwrite_existing: false
  require_certified_input: true
  text_read_chars: 4000

primary_docket_narrative:
  input_root: "triage/document_types"
  output_root: "narrative/primary_docket_narratives"
  overwrite_existing: false
  require_certified_input: true

sentence_span_generation:
  output_root: "extract/sentence_spans"
  segmentation_version: "sentence-split-v1"
  include_context: true

atomic_extraction:
  sentence_span_root: "extract/sentence_spans"
  output_root: "extract/atomic"
  require_certified_input: true
  prompt_version: "claim-inference-v1"
  model_contract_version: "sentence-to-claims-v1"
  ontology_version: "claims-ontology-v1"
  mapping_contract_version: "claim-mapping-v1"
  live_max_retries: 3
  live_retry_base_delay_seconds: 1.0
  batch_completion_window: "24h"
  batch_poll_interval_seconds: 5.0
  batch_max_polls: 120

logging:
  level: INFO
