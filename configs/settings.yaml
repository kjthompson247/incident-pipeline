project:
  name: incident-pipeline
  version: 0.1

paths:
  data_root: "${INCIDENT_PIPELINE_DATA_ROOT}"
  source_root: "${INCIDENT_PIPELINE_NTSB_SOURCE_ROOT}"
  raw: "${INCIDENT_PIPELINE_NTSB_RAW_ROOT}"
  staged: "${INCIDENT_PIPELINE_NTSB_INGESTION_ROOT}"
  processed: "${INCIDENT_PIPELINE_NTSB_EXTRACT_ROOT}"
  manifests: "${INCIDENT_PIPELINE_NTSB_MANIFESTS_ROOT}"
  logs: "${INCIDENT_PIPELINE_NTSB_LOGS_ROOT}"

database:
  manifest_path: "${INCIDENT_PIPELINE_MANIFEST_DB_PATH}"

ntsb_acquisition:
  data_root: "${NTSB_ACQUIRE_DATA_ROOT}"
  sqlite_path: "${NTSB_ACQUIRE_SQLITE_PATH}"
  downstream_raw_root: "${NTSB_ACQUIRE_DOWNSTREAM_RAW_ROOT}"

ingestion:
  allowed_extensions:
    - .pdf
  compute_hash: true
  skip_duplicates: true

extraction:
  method: pypdf
  min_text_threshold: 500

ocr:
  enabled: false
  engine: tesseract
  min_text_threshold: 200

processing:
  overwrite_existing: false
  max_workers: 4

docket_ingest:
  manifest_path: "${INCIDENT_PIPELINE_INGESTION_MANIFEST_PATH}"
  output_root: "${INCIDENT_PIPELINE_DOCKET_INGEST_OUTPUT_ROOT}"
  overwrite_existing: false

docket_triage:
  metadata_root: "${INCIDENT_PIPELINE_DOCKET_TRIAGE_METADATA_ROOT}"
  text_root: "${INCIDENT_PIPELINE_DOCKET_TRIAGE_TEXT_ROOT}"
  output_root: "${INCIDENT_PIPELINE_DOCKET_TRIAGE_OUTPUT_ROOT}"
  overwrite_existing: false
  text_read_chars: 4000

primary_docket_narrative:
  input_root: "${INCIDENT_PIPELINE_PRIMARY_NARRATIVE_INPUT_ROOT}"
  output_root: "${INCIDENT_PIPELINE_PRIMARY_NARRATIVE_OUTPUT_ROOT}"
  overwrite_existing: false

logging:
  level: INFO
